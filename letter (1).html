  .message-box {
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(6px);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 20px;
    padding: 22px 36px;
    text-align: center;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(180,0,80,0.18);
  }

  .message-box p {
    font-size: 1.35rem;
    color: #3a0020;
    font-weight: bold;
    text-shadow: 0 1px 2px rgba(255,255,255,0.6);
    letter-spacing: 0.01em;
  }

  .btn-row {
    display: flex;
    gap: 24px;
    align-items: center;
    justify-content: center;
  }

  .btn-yes {
    background: linear-gradient(135deg, #ff2d78, #ff6baa);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 44px;
    font-size: 1.2rem;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(255,45,120,0.45);
    transition: transform 0.12s, box-shadow 0.12s;
    letter-spacing: 0.04em;

<body>

<div id="page1">
  <div class="message-box">
    <p>💌 Hey! James has got a letter for you.<br>Would you like to open it?</p>
  </div>
  <div class="btn-row" style="position:relative; width:260px; height:60px;">
    <button class="btn-yes" onclick="openLetter()">Yes 💖</button>
    <button class="btn-no" id="noBtn" onclick="runAway()">No 🙈</button>
  </div>
</div>

<div id="page2"></div>

<script>
  const noBtn = document.getElementById('noBtn');
  let noSize = 1.2;   // rem
  let noPad  = 14;    // px vertical
  let escapeTries = 0;

  // Position No button initially
  noBtn.style.left = '140px';
  noBtn.style.top  = '0px';

  function runAway() {
    escapeTries++;
    // Shrink
    noSize = Math.max(0.45, noSize - 0.13);
    noPad  = Math.max(4,    noPad  - 3);
    noBtn.style.fontSize = noSize + 'rem';
    noBtn.style.padding  = noPad + 'px ' + (noPad * 2.5) + 'px';

    // Move to random spot within page1
    const page1 = document.getElementById('page1');
    const w = page1.offsetWidth;
    const h = page1.offsetHeight;
    const bw = noBtn.offsetWidth  || 100;
    const bh = noBtn.offsetHeight || 40;

    const maxX = w - bw - 10;
    const maxY = h - bh - 10;
    const rx   = Math.random() * maxX;
    const ry   = Math.random() * maxY;

    noBtn.style.left = rx + 'px';
    noBtn.style.top  = ry + 'px';

    // After too many tries, hide it completely
    if (escapeTries >= 8) {
      noBtn.style.display = 'none';
    }
  }

  function openLetter() {
    document.getElementById('page1').style.display = 'none';
    document.getElementById('page2').style.display = 'block';
  }
</script>
</body>
